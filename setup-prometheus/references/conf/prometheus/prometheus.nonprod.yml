global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_url: http://prometheus-nonprod.renew.com:9090
  external_labels:
    cluster: 'tech-stack'
    env: 'nonprod'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager-nonprod.renew.com:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ====== Dev 环境 Spring Boot（via consul_sd）======
  - job_name: 'spring-boot-dev'
    consul_sd_configs:
      - server: 'consul-dev.renew.com:8500'
        tags: ['metrics']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - target_label: env
        replacement: dev
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s

  # ====== SIT 环境 Spring Boot（via consul_sd）======
  - job_name: 'spring-boot-sit'
    consul_sd_configs:
      - server: 'consul-sit.renew.com:8500'
        tags: ['metrics']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - target_label: env
        replacement: sit
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s

  # ====== FAT 环境 Spring Boot（via consul_sd）======
  - job_name: 'spring-boot-fat'
    consul_sd_configs:
      - server: 'consul-fat.renew.com:8500'
        tags: ['metrics']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - target_label: env
        replacement: fat
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s

  # ====== UAT 环境 Spring Boot（via consul_sd）======
  - job_name: 'spring-boot-uat'
    consul_sd_configs:
      - server: 'consul-uat.renew.com:8500'
        tags: ['metrics']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - target_label: env
        replacement: uat
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s

  # ====== RabbitMQ Metrics（4 环境）======
  - job_name: 'rabbitmq-dev'
    static_configs:
      - targets: ['rabbitmq-dev.renew.com:15692']
        labels:
          env: dev
    metrics_path: '/metrics'

  - job_name: 'rabbitmq-sit'
    static_configs:
      - targets: ['rabbitmq-sit.renew.com:15692']
        labels:
          env: sit
    metrics_path: '/metrics'

  - job_name: 'rabbitmq-fat'
    static_configs:
      - targets: ['rabbitmq-fat.renew.com:15692']
        labels:
          env: fat
    metrics_path: '/metrics'

  - job_name: 'rabbitmq-uat'
    static_configs:
      - targets: ['rabbitmq-uat.renew.com:15692']
        labels:
          env: uat
    metrics_path: '/metrics'

  # ====== OTel Collector（nonprod 共用实例）======
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-nonprod.renew.com:8888']
        labels:
          env: nonprod
    metrics_path: '/metrics'

  # ====== Loki（nonprod 共用实例）======
  - job_name: 'loki'
    static_configs:
      - targets: ['loki-nonprod.renew.com:3100']
