global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_url: http://prometheus-prod.renew.com:9090
  external_labels:
    cluster: 'tech-stack'
    env: 'prod'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager-prod.renew.com:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ====== Prod 环境 Spring Boot（via consul_sd）======
  - job_name: 'spring-boot'
    consul_sd_configs:
      - server: 'consul-prod.renew.com:8500'
        tags: ['metrics']
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: job
      - target_label: env
        replacement: prod
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s

  # ====== RabbitMQ Metrics（prod）======
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-prod.renew.com:15692']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== OTel Collector（prod 独立实例）======
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-prod.renew.com:8888']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== Loki（prod 独立实例）======
  - job_name: 'loki'
    static_configs:
      - targets: ['loki-prod.renew.com:3100']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== Tempo（prod 独立实例）======
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo-prod.renew.com:3200']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== Alertmanager 自身指标 ======
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager-prod.renew.com:9093']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== MySQL Exporter（prod）======
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-prod.renew.com:9104']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== Redis Exporter（prod）======
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-prod.renew.com:9121']
        labels:
          env: prod
    metrics_path: '/metrics'

  # ====== MongoDB Exporter（prod）======
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-prod.renew.com:9216']
        labels:
          env: prod
    metrics_path: '/metrics'
