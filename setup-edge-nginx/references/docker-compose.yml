version: '3.8'

services:
  edge-nginx:
    image: nginx:1.27-alpine
    container_name: tech-edge-nginx-${ENV}
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./includes:/etc/nginx/includes:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    environment:
      - ENV=${ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
