# 默认 server（兜底）
# 匹配所有未配置的域名，返回 444（无响应）

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # SSL 证书（兜底使用自签名证书或真实证书）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 返回 444（关闭连接，不发送响应）
    return 444;
}
