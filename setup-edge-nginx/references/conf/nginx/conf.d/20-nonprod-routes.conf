# 非生产公网路由（--env nonprod）
# 统一 HTTPS，默认公开访问
# 处理域名：*.dev/sit/fat/uat.web/api.renew.com
#
# 说明：
#   - ${K3S_HOST} / ${K3S_PORT} 由 start.md 的 Python 脚本本地正则替换
#     （从 .env 的 K3S_NONPROD_HOST / K3S_NONPROD_PORT 注入），再上传到 DMZ 节点
#   - nginx 内置变量（如 $host / $remote_addr）保持原样，渲染脚本不动
#   - IP 白名单域名通过 add-route 追加到 30-whitelist-routes.conf

upstream k3s_nonprod {
    server ${K3S_HOST}:${K3S_PORT};
    keepalive 32;
}

# Dev 环境路由（公开访问）
server {
    listen 443 ssl;
    server_name ~^[a-z0-9-]+\.dev\.(web|api)\.renew\.com$;

    include /etc/nginx/includes/ssl-params.conf;
    include /etc/nginx/includes/security-headers.conf;

    location / {
        proxy_pass http://k3s_nonprod;
        include /etc/nginx/includes/proxy-params.conf;
    }
}

