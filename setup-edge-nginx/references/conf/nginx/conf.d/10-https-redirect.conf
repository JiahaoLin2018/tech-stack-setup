# HTTP → HTTPS 重定向
# 所有 HTTP 请求自动 301 重定向到 HTTPS
# 仅保留 /health 端点用于健康检查

server {
    listen 80;
    server_name _;

    # 健康检查端点（允许 HTTP 访问）
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
