# nginx 边缘网关主配置
# 文件位置：/opt/tech-stack/edge-nginx-{env}/nginx.conf

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 隐藏版本号
    server_tokens off;

    # 缓冲区设置
    client_body_buffer_size 128k;
    client_max_body_size 50m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    # upstream 定义在各路由配置文件中：
    # - 20-nonprod-routes.conf: upstream k3s_nonprod
    # - 20-prod-routes.conf: upstream k3s_prod

    # 限流 zone 声明（仅声明，server / location 按需 include limit_req）
    include /etc/nginx/includes/rate-limit.conf;

    # 加载 server 配置
    include /etc/nginx/conf.d/*.conf;
}

# 健康检查端点（独立 server，监听 8888）
server {
    listen 8888;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
