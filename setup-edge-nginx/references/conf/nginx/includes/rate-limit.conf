# 限流 zone 声明（不强制启用）
# 由 nginx.conf 的 http 块 include，在每个 server / location 中按需 include limit_req
#
# 三档预置 zone（按风险分级，部署方按域名重要度选用）：
#   edge_loose  100r/s   公网业务流量默认档（前端、API 网关）
#   edge_normal  10r/s   管理后台、写接口默认档
#   edge_strict   2r/s   登录、验证码、密码重置等敏感接口
#
# 启用方式（在 server 或 location 块内）：
#   limit_req zone=edge_normal burst=20 nodelay;
#   limit_req_status 429;

limit_req_zone $binary_remote_addr zone=edge_loose:10m   rate=100r/s;
limit_req_zone $binary_remote_addr zone=edge_normal:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=edge_strict:10m  rate=2r/s;
