# Grafana Web UI — 域级共用（② 类域名，nonprod/prod 各一套）
# 直连数据端口（grafana-nonprod.renew.com）通过 hosts.lan 直接访问，不走此反代
# 此处仅代理 Web UI（浏览器访问）

server {
    listen 80;
    server_name grafana-nonprod-ui.renew.com;
    location / {
        proxy_pass http://${GRAFANA_NONPROD_HOST}:${GRAFANA_PORT};
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name grafana-prod-ui.renew.com;
    location / {
        proxy_pass http://${GRAFANA_PROD_HOST}:${GRAFANA_PORT};
        include /etc/nginx/proxy_params;
    }
}
