# Alertmanager Web UI — 域级共用（② 类域名，nonprod/prod 各一套）

server {
    listen 80;
    server_name alertmanager-nonprod-ui.renew.com;
    location / {
        proxy_pass http://${ALERTMANAGER_NONPROD_HOST}:${ALERTMANAGER_PORT};
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name alertmanager-prod-ui.renew.com;
    location / {
        proxy_pass http://${ALERTMANAGER_PROD_HOST}:${ALERTMANAGER_PORT};
        include /etc/nginx/proxy_params;
    }
}
