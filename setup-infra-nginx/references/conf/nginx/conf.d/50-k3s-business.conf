# 业务域名 → K3s Traefik（内网直达）
# 局域网用户通过 dnsmasq 泛解析到 infra-nginx，由此分发到对应环境的 K3s Traefik
# 公网用户走 edge-nginx (DMZ)，不经过此配置
#
# 路由分流：
#   *.dev|sit|fat|uat.web/api.renew.com → 非生产 K3s Traefik (K3S_NONPROD_TRAEFIK_HOST)
#   *.prod.web/api.renew.com            → 生产    K3s Traefik (K3S_PROD_TRAEFIK_HOST)
# 两套 K3s 集群物理隔离，分别承载 nonprod / prod 业务负载

# 非生产业务域名
server {
    listen 80;
    server_name ~^.+\.dev\.web\.renew\.com$
                ~^.+\.dev\.api\.renew\.com$
                ~^.+\.sit\.web\.renew\.com$
                ~^.+\.sit\.api\.renew\.com$
                ~^.+\.fat\.web\.renew\.com$
                ~^.+\.fat\.api\.renew\.com$
                ~^.+\.uat\.web\.renew\.com$
                ~^.+\.uat\.api\.renew\.com$;

    location / {
        proxy_pass http://${K3S_NONPROD_TRAEFIK_HOST}:${K3S_TRAEFIK_PORT};
        include /etc/nginx/proxy_params;
    }
}

# 生产业务域名
server {
    listen 80;
    server_name ~^.+\.prod\.web\.renew\.com$
                ~^.+\.prod\.api\.renew\.com$;

    location / {
        proxy_pass http://${K3S_PROD_TRAEFIK_HOST}:${K3S_TRAEFIK_PORT};
        include /etc/nginx/proxy_params;
    }
}
