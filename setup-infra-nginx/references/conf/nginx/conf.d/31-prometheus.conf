# Prometheus Web UI — 域级共用（② 类域名，nonprod/prod 各一套）
# 注意：prometheus-{nonprod|prod}.renew.com（直连采集/查询端口 :9090）通过 hosts.lan 直连，不走此反代
# 此处仅代理 Web UI（浏览器访问 Prometheus 查询界面）

server {
    listen 80;
    server_name prometheus-nonprod-ui.renew.com;
    location / {
        proxy_pass http://${PROMETHEUS_NONPROD_HOST}:${PROMETHEUS_PORT};
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name prometheus-prod-ui.renew.com;
    location / {
        proxy_pass http://${PROMETHEUS_PROD_HOST}:${PROMETHEUS_PORT};
        include /etc/nginx/proxy_params;
    }
}
