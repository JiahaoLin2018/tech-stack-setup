# RabbitMQ Management Web UI — 环境级 Web UI（④ 类域名，5 环境独立）
# 注意：rabbitmq-{env}.renew.com（直连 AMQP :5672）通过 hosts.lan 直连，不走此反代
# 此处仅代理 Management UI（浏览器访问 RabbitMQ 管理界面）

server {
    listen 80;
    server_name rabbitmq-dev-ui.renew.com;
    location / {
        proxy_pass http://${RABBITMQ_DEV_HOST}:${RABBITMQ_MGMT_PORT};
        include /etc/nginx/proxy_params;
    }
}

