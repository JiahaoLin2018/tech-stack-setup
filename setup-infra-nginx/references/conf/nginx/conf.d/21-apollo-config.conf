# Apollo Config Service — 环境路由（④ 类域名，每环境独立端口）
# 微服务通过 apollo-config-{env}.renew.com 访问对应环境的 Config Service
# 域名格式：apollo-config-{env}.renew.com → APOLLO_HOST:860x（nonprod）/ APOLLO_PROD_HOST:8605（prod）
#
# 端口分配（architecture-blueprint.md 附录 A）：
#   dev:8601  sit:8602  fat:8603  uat:8604  prod:8605

server {
    listen 80;
    server_name apollo-config-dev.renew.com;
    location / {
        proxy_pass http://${APOLLO_HOST}:8601;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name apollo-config-sit.renew.com;
    location / {
        proxy_pass http://${APOLLO_HOST}:8602;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name apollo-config-fat.renew.com;
    location / {
        proxy_pass http://${APOLLO_HOST}:8603;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name apollo-config-uat.renew.com;
    location / {
        proxy_pass http://${APOLLO_HOST}:8604;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    server_name apollo-config-prod.renew.com;
    location / {
        # 生产 Apollo Config 在独立生产网段，使用独立变量 APOLLO_PROD_HOST
        proxy_pass http://${APOLLO_PROD_HOST}:8605;
        include /etc/nginx/proxy_params;
    }
}
