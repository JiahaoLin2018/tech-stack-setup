# Consul Web UI — 环境级 Web UI（④ 类域名，5 环境独立）
# 注意：consul-{env}.renew.com（直连 API 端口 :8500/:8600）通过 hosts.lan 直连，不走此反代
# 此处仅代理 Web UI（浏览器访问 Consul 管理界面）

server {
    listen 80;
    server_name consul-dev-ui.renew.com;
    location / {
        proxy_pass http://${CONSUL_DEV_HOST}:${CONSUL_PORT};
        include /etc/nginx/proxy_params;
    }
}

