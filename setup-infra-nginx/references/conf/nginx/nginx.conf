user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# HTTP 块：内部 Web UI 反代（:80）
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile   on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    include /etc/nginx/conf.d/*.conf;
}

# Stream 块：TCP 四层透传
stream {
    log_format stream '$remote_addr [$time_local] $protocol $status $bytes_sent';
    access_log /var/log/nginx/stream.log stream;

    # GitLab SSH（:2222 → GITLAB_HOST:GITLAB_SSH_PORT）
    server {
        listen 2222;
        proxy_pass ${GITLAB_HOST}:${GITLAB_SSH_PORT};
        proxy_connect_timeout 10s;
        proxy_timeout 3600s;
    }

    # Nexus Docker Registry（:8082 → NEXUS_HOST:NEXUS_DOCKER_PORT）
    server {
        listen 8082;
        proxy_pass ${NEXUS_HOST}:${NEXUS_DOCKER_PORT};
        proxy_connect_timeout 10s;
        proxy_timeout 600s;
    }
}
