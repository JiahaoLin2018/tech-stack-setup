services:
  mysql:
    image: mysql:8.4
    container_name: tech-mysql-${ENV:-dev}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_APP_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./data:/var/lib/mysql
      - ./conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL:-1G}
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEMORY_LIMIT:-2g}
        reservations:
          memory: ${MYSQL_MEMORY_RESERVATION:-512m}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: tech-mysql-exporter-${ENV:-dev}
    restart: unless-stopped
    # v0.16.0 仅支持 .my.cnf 文件 / 命令行参数两种连接方式，本项目使用 .my.cnf 文件挂载（避免密码出现在 docker inspect）
    command:
      - --config.my-cnf=/etc/.my.cnf
    volumes:
      - ./conf/exporter.my.cnf:/etc/.my.cnf:ro
    ports:
      - "${MYSQLD_EXPORTER_PORT:-9104}:9104"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9104/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
