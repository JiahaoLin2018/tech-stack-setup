# MongoDB 8.0 生产级配置
#
# 注意：以下参数已移至 .env 通过 docker-compose command 传入，此处不再配置：
#   - wiredTiger.engineConfig.cacheSizeGB  → MONGO_CACHE_SIZE_GB
#   - net.maxIncomingConnections            → MONGO_MAX_CONNECTIONS
#   - operationProfiling.slowOpThresholdMs  → MONGO_SLOW_OP_THRESHOLD_MS

storage:
  dbPath: /data/db
  # Note: journal.enabled removed in MongoDB 8.0 (journaling is always enabled)
  wiredTiger:
    collectionConfig:
      blockCompressor: snappy

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  timeStampFormat: iso8601-local

net:
  port: 27017
  # 绑定所有接口以支持 Docker 网络访问；安全性由 Docker 网络隔离 + 防火墙保障
  # 生产环境务必配置宿主机防火墙限制 MONGO_PORT 的访问来源
  bindIp: 0.0.0.0

security:
  authorization: enabled

operationProfiling:
  mode: slowOp
