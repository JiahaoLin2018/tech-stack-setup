# Apollo 公共配置模板 — tech.common
#
# 用途：所有项目共享的默认配置，项目关联后可零配置启动
# 部署：在 Apollo Portal 创建 tech.common namespace，导入此文件
# 覆盖：在项目专属 namespace 中配置同名项可覆盖默认值
#
# 配置优先级：项目配置 > tech.common 默认值

#===============================================================================
# 通用配置（所有项目类型适用）
#===============================================================================

# K8s 部署配置
# k8sReplicas: 常态副本数，必须为正整数，生产环境建议 2+
ops.k8sReplicas=1

# k8sReplicasMin/Max: HPA 自动扩缩容配置，不填则不启用 HPA
# 推荐值：Min 与 k8sReplicas 相同，Max 根据负载预估
ops.k8sReplicasMin=
ops.k8sReplicasMax=

# k8sTargetCPU/Memory: HPA 触发阈值，推荐 CPU 70%，内存 80%
ops.k8sTargetCPU=70
ops.k8sTargetMemory=80

# k8sPdbMinAvailable: PDB 最小可用副本
# 规则：副本数 >= 2 时自动创建 PDB（默认 minAvailable=1），设为 0 可显式禁用
# ⚠️ 必须小于 k8sReplicas，否则节点维护时 kubectl drain 会被 PDB 永久阻塞
ops.k8sPdbMinAvailable=

# k8sUpdateStrategy: 更新策略，可选 RollingUpdate（滚动）/ Recreate（重建）
ops.k8sUpdateStrategy=RollingUpdate

# 资源限制
# appCpuLimit: CPU 限制（核），轻量服务 0.5，常规 1，计算密集 2+
#   ⚠️ 最低不能低于 0.2（200m）——脚本内 Java/Python requests.cpu 硬编码为 100m，低于 0.2 时
#      limits < requests，K8s 会拒绝创建 Pod
# appMemoryLimit: 内存限制（Mi），Java 建议 2048+，前端 128，Python 256+
#   ⚠️ Python 项目最低不能低于 256——脚本内 Python requests.memory 硬编码为 256Mi，
#      低于 256 时 limits < requests，K8s 会拒绝创建 Pod
ops.appCpuLimit=1
ops.appMemoryLimit=1024

# 域名配置
# appDomain: 域名，多个用空格分隔，不配置则不创建 Ingress
# 格式：{project}.{env}.{type}.renew.com，如 demo.fat.api.renew.com
ops.appDomain=

# appDomainReverseProxyUri: 反向代理路径，根部署用 /，子目录部署用 /app
ops.appDomainReverseProxyUri=/

# 持久化存储（无状态服务保持 false）
# persistentStorage: 是否启用持久化存储
# persistentStorageSize: 存储大小（Gi）
# persistentStoragePath: 容器内挂载路径
ops.persistentStorage=false
ops.persistentStorageSize=1
ops.persistentStoragePath=/data

#===============================================================================
# Java 项目配置
#===============================================================================

# javaVersion: 运行时 JDK 版本（控制 Docker 基础镜像），可选 8/11/17/21
# ⚠️ 必须与 GitLab 项目级 Variable JAVA_CI_VERSION 及 pom.xml <java.version> 三者保持一致：
#    JAVA_CI_VERSION（GitLab）= ops.javaVersion（Apollo）= <java.version>（pom.xml）
#    不一致会导致字节码版本不兼容（UnsupportedClassVersionError）
# Spring Boot 版本对应关系：
#   Spring Boot 3.x → Java 17 或 21（推荐 21）
#   Spring Boot 2.x → Java 8 或 11
ops.javaVersion=21

# mavenBuildCommand: Maven 构建命令
ops.mavenBuildCommand=mvn clean install -Dmaven.test.skip=true

# javaCmdOptions: JVM 参数，不要设置 -Xmx/-Xms（脚本根据 appMemoryLimit 自动计算）
# 默认包含：服务端模式、日志目录、OOM 时生成 heap dump
ops.javaCmdOptions=-server -Dlog.dir=/app/logs/app -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp

# appHealthUri: 健康检查路径
# Java 默认 /actuator/health，Python 默认 /health，请在项目 namespace 中覆盖
ops.appHealthUri=/actuator/health

# appPort: 应用端口
# Java 不填则读取 application.yml 中的 server.port
# Python 必须配置
ops.appPort=

# autoReuseImage: 是否复用已有镜像（相同 commit 时跳过构建）
# Java 默认 true，Python 默认 false，请在项目 namespace 中覆盖
ops.autoReuseImage=true

# supportOtel: 是否启用 OTel 链路追踪和日志采集
ops.supportOtel=true

# otelMode: OTel 接入模式
# - bridge: Micrometer + OTel Bridge（Spring Boot 3.x 主力方案，推荐）
# - agent: OpenTelemetry Java Agent（Spring Boot 2.x 兜底方案）
# 注意：JDK < 17 时，app.sh 会自动强制切换为 agent 模式
ops.otelMode=bridge

#===============================================================================
# 前端项目配置（Node.js/Nginx）
#===============================================================================

# nodejsVersion: Node.js 版本（仅构建阶段使用），可选 16/18/20，推荐 20（LTS）
ops.nodejsVersion=20

# nodejsBuildCommand: 构建命令，默认 npm，也可用 yarn build
ops.nodejsBuildCommand=npm install && npm run build

# htmlPackageDirectory: 打包产物目录，Vite 默认 dist，Webpack 默认 build
ops.htmlPackageDirectory=dist

# 前端运行时镜像固定为 nginx:1.27，appPort 固定为 80，无需配置

#===============================================================================
# Python 项目配置
#===============================================================================

# pythonVersion: Python 版本，可选 3.9/3.10/3.11/3.12，推荐 3.11（稳定）
ops.pythonVersion=3.11

# pyBuildCommand: 构建命令，也可使用 poetry install
ops.pyBuildCommand=pip install -r requirements.txt

# pyStartCommand: 启动命令
# FastAPI 示例：uvicorn main:app --host 0.0.0.0 --port 8000
# ⚠️ 命令中不能包含双引号（"），否则会破坏 K8s Deployment YAML 格式导致部署失败
ops.pyStartCommand=python main.py

# 注意：Python 项目共用以下配置项，需在项目 namespace 中覆盖：
# - ops.appHealthUri: 建议设为 /health
# - ops.appPort: 必须配置
# - ops.autoReuseImage: 建议设为 false
