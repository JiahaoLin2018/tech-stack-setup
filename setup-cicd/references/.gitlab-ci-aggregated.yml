# ============================================================================
# 生产环境：构建所有模块
# ============================================================================
prod_jar:
  stage: prod_jar
  tags:
    - prod
  only:
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  cache:
    <<: *jar_cache
    policy: push
    key: ${CI_COMMIT_REF_NAME}-prod
  script:
    - mvn clean install -Dmaven.test.skip=true
  when: manual

# ============================================================================
# 生产环境：部署模板
# ============================================================================
.prod_deploy_template: &prod_deploy_template
  tags:
    - prod
  only:
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  cache:
    <<: *jar_cache
    policy: pull
    key: ${CI_COMMIT_REF_NAME}-prod
  script:
    - /bin/bash /opt/tech-stack/cicd/app.sh
  when: manual

# ============================================================================
# 生产环境部署 - 4 个微服务
# ============================================================================
