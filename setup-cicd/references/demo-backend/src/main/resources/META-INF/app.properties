# Apollo 应用 ID 配置
# 本地开发时，Apollo Client 在 Spring 初始化之前读取此文件
# CI/CD 部署时，app.sh 通过 JVM 参数 -Dapp.id=xxx 注入（优先级更高，此文件作为后备）
app.id=demo-backend

# Apollo Meta Server 地址（本地开发时生效）
# CI/CD 部署时由 app.sh 注入 -Dapollo.meta=http://apollo-config-{env}.renew.com 覆盖
apollo.meta=http://apollo-config-fat.renew.com

# Apollo 本地缓存目录
apollo.cacheDir=./config
