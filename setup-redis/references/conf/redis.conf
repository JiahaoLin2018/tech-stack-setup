# 容器化场景下监听所有接口（宿主端口透传需要）
# 安全依赖：ACL 密码认证 + 内网防火墙
bind 0.0.0.0
port 6379

# ACL file in /data (writable volume) for user persistence
# Default user password and exporter user are defined here
# Password via --requirepass conflicts with aclfile in Redis 8.0, so all users managed via ACL
aclfile /data/users.acl

# Memory - maxmemory via docker-compose command (from .env)
maxmemory-policy allkeys-lru

# Persistence - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes

# Network
tcp-backlog 511
tcp-keepalive 300
timeout 300

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000  # 慢查询阈值（单位：微秒，10000μs = 10ms）
slowlog-max-len 128

databases 16
