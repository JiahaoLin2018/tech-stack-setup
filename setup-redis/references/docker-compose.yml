services:
  redis:
    image: redis:8.0-alpine
    container_name: tech-redis-${ENV:-dev}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data:/data
      - ./conf/redis.conf:/etc/redis/redis.conf:ro
    environment:
      TZ: Asia/Shanghai
    command: >-
      redis-server /etc/redis/redis.conf
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-1g}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION:-256m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0-alpine
    container_name: tech-redis-exporter-${ENV:-dev}
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_USER: "${REDIS_EXPORTER_USER:-exporter}"
      REDIS_PASSWORD: "${REDIS_EXPORTER_PASSWORD}"
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
