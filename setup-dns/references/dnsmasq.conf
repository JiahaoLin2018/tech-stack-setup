# dnsmasq 配置 — 局域网 DNS 服务器
# 为 tech-stack 基础设施提供 *.renew.com 域名解析

# 上游 DNS（解析公网域名，如 baidu.com、github.com）
# 由 setup-dns start 步骤 8 用 .env 中的 UPSTREAM_DNS_* 替换
server=${UPSTREAM_DNS_PRIMARY}
server=${UPSTREAM_DNS_SECONDARY}

# 本地域名映射文件（直连服务的精确 IP 映射）
addn-hosts=/etc/hosts.lan

# 动态绑定接口（必须启用）
# 解决 Docker 环境下 docker0 网桥干扰 dnsmasq 应答的问题：
# 默认模式下 dnsmasq 使用 wildcard socket 监听，收到查询后会枚举系统网卡，
# 发现 docker0 等非预期接口后会静默丢弃查询（不报错、不记日志）。
# bind-dynamic 让 dnsmasq 仅绑定已知接口，同时允许运行时动态发现新接口。
bind-dynamic

# 不读取系统 /etc/resolv.conf（容器内不需要）
no-resolv

# 不读取系统 /etc/hosts（避免干扰）
no-hosts

# DNS 缓存条数（提升重复查询速度）
cache-size=1000

# 日志配置（记录 DNS 查询，方便排障）
# log-async=20: 异步写日志，避免高 QPS 下日志阻塞查询响应
log-queries
log-async=20
log-facility=/dev/stdout

# 不转发不含点号的短名称查询
domain-needed

# 不转发私有地址段的反向查询
bogus-priv

# DNS rebinding 防护：拒绝上游返回的 RFC1918 私有地址（防止恶意外部域名解析到内网 IP 实施 SSRF）
# rebind-localhost-ok 例外：允许 127.0.0.0/8（本地服务自检需要）
stop-dns-rebind
rebind-localhost-ok

# ============================================================
# 泛解析兜底：所有未在 hosts.lan 中定义的 *.renew.com → infra-nginx
#
# 覆盖范围：
#   - 全局唯一服务 Web UI（gitlab/nexus/harbor/dns）
#   - 域级共用 UI（grafana-nonprod-ui / prometheus-nonprod-ui 等）
#   - 非生产独有（apollo.renew.com）
#   - 环境级 Web UI（consul-{env}-ui / rabbitmq-{env}-ui）
#   - Apollo Config（apollo-config-{env}.renew.com）
#   - 业务应用（*.{env}.web/api.renew.com）
#   - 任何新增但尚未写入 hosts.lan 的 *.renew.com 域名
#
# 解析优先级：hosts.lan 精确匹配 > address= 泛解析
#   → 直连域名（mysql-dev/otel-nonprod 等）在 hosts.lan 中精确指定 IP，不受此条影响
# ============================================================
address=/.renew.com/${INFRA_NGINX_IP}
