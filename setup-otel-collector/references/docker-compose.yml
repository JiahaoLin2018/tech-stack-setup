services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: tech-otel-collector-${ENV:-nonprod}
    restart: unless-stopped
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_METRICS_PORT:-8888}:8888"
    volumes:
      - ./conf/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      # otel-collector-contrib 是最小化镜像，无 /bin/sh 和 wget
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${OTEL_MEMORY_LIMIT:-512m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
