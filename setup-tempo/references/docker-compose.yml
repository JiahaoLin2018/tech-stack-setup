services:
  tempo:
    image: grafana/tempo:2.7.0
    container_name: tech-tempo-${ENV:-nonprod}
    restart: unless-stopped
    user: "10001:10001"
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
      # OTLP gRPC/HTTP — OTel Collector 转发 traces 到此端口
      # 宿主机端口使用 14317/14318 避免与 OTel Collector 的 4317/4318 冲突
      - "${TEMPO_OTLP_GRPC_PORT:-14317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-14318}:4318"
      - "${TEMPO_ZIPKIN_PORT:-9411}:9411"
    volumes:
      - ./conf/tempo-config.yml:/etc/tempo/config.yml:ro
      - ./data/tempo:/var/tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${TEMPO_MEMORY_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
