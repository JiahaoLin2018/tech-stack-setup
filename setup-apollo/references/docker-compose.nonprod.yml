services:
  # ================================================================
  # Apollo 专用 MySQL（非生产）
  # Schema: ApolloPortalDB + ApolloConfigDB_dev/sit/fat/uat
  # 与业务 MySQL（setup-mysql）完全独立，与生产 Apollo MySQL 完全隔离
  # ================================================================
  apollo-db:
    image: mysql:8.4
    container_name: tech-apollo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${APOLLO_DB_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${APOLLO_DB_PORT:-3307}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=384M
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${APOLLO_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ================================================================
  # DEV 环境 — Config Service + Admin Service
  # DB: ApolloConfigDB_dev | 宿主机端口: Config:8601 / Admin:8611
  # ================================================================
  apollo-config-dev:
    image: apolloconfig/apollo-configservice:2.5.0
    container_name: tech-apollo-config-dev
    restart: unless-stopped
    depends_on:
      apollo-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-db:3306/ApolloConfigDB_dev?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_DB_ROOT_PASSWORD}
      JAVA_OPTS: "-server -Xms256m -Xmx512m -XX:+UseG1GC"
      TZ: Asia/Shanghai
    ports:
      - "${APOLLO_CONFIG_PORT_DEV:-8601}:8080"
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  apollo-admin-dev:
    image: apolloconfig/apollo-adminservice:2.5.0
    container_name: tech-apollo-admin-dev
    restart: unless-stopped
    depends_on:
      apollo-config-dev:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-db:3306/ApolloConfigDB_dev?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_DB_ROOT_PASSWORD}
      JAVA_OPTS: "-server -Xms256m -Xmx384m -XX:+UseG1GC -Deureka.service.url=http://apollo-config-dev:8080/eureka/"
      TZ: Asia/Shanghai
    ports:
      - "${APOLLO_ADMIN_PORT_DEV:-8611}:8090"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

