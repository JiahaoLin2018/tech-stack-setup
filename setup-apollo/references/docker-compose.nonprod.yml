  # ================================================================
  # Portal — 统一管理界面（全局唯一，仅 nonprod 部署）
  # 宿主机端口: 8070 | 访问：http://apollo.renew.com（infra-nginx 代理）
  # PRO_META 使用跨网段域名，Portal 通过 infra-nginx 代理访问生产 Config Service
  # ================================================================
  apollo-portal:
    image: apolloconfig/apollo-portal:2.5.0
    container_name: tech-apollo-portal
    restart: unless-stopped
    depends_on:
      apollo-config-dev:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-db:3306/ApolloPortalDB?characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_DB_ROOT_PASSWORD}
      APOLLO_PORTAL_ENVS: ${APOLLO_ENVS:-dev,sit,fat,uat,pro}
      # 非生产环境使用 Docker 内网容器名（端口 8080 为容器内部端口）
      DEV_META: http://apollo-config-dev:8080
      SIT_META: http://apollo-config-sit:8080
      FAT_META: http://apollo-config-fat:8080
      UAT_META: http://apollo-config-uat:8080
      # 生产环境 Config 在独立生产网段，通过 infra-nginx 代理跨网段访问
      # 阶段四 setup-apollo --env prod 部署后，Portal 即可管理生产配置
      PRO_META: ${APOLLO_PRO_META:-http://apollo-config-prod.renew.com}
      JAVA_OPTS: "-server -Xms256m -Xmx512m -XX:+UseG1GC"
      TZ: Asia/Shanghai
    ports:
      - "${APOLLO_PORTAL_PORT:-8070}:8070"
    deploy:
